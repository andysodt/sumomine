<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Kokugikan Tower Silhouette -->
  <g fill="#000000">
    <!-- Main tower structure -->
    <rect x="45" y="30" width="30" height="70" />

    <!-- Tower base/foundation -->
    <rect x="40" y="95" width="40" height="8" />

    <!-- Traditional Japanese roof structure -->
    <polygon points="35,30 60,15 85,30 75,30 60,20 45,30" />

    <!-- Roof details -->
    <rect x="42" y="28" width="36" height="4" />
    <rect x="40" y="32" width="40" height="2" />

    <!-- Tower segments/floors -->
    <rect x="43" y="45" width="34" height="2" />
    <rect x="43" y="60" width="34" height="2" />
    <rect x="43" y="75" width="34" height="2" />

    <!-- Side architectural details -->
    <rect x="38" y="40" width="4" height="55" />
    <rect x="78" y="40" width="4" height="55" />

    <!-- Windows/openings -->
    <rect x="48" y="38" width="6" height="4" fill="#ffffff" />
    <rect x="66" y="38" width="6" height="4" fill="#ffffff" />
    <rect x="48" y="50" width="6" height="6" fill="#ffffff" />
    <rect x="66" y="50" width="6" height="6" fill="#ffffff" />
    <rect x="48" y="65" width="6" height="6" fill="#ffffff" />
    <rect x="66" y="65" width="6" height="6" fill="#ffffff" />
    <rect x="48" y="80" width="6" height="6" fill="#ffffff" />
    <rect x="66" y="80" width="6" height="6" fill="#ffffff" />

    <!-- Central tower peak -->
    <polygon points="58,15 62,15 60,10" />

    <!-- Additional roof elements -->
    <rect x="50" y="20" width="20" height="6" />
    <rect x="52" y="18" width="16" height="2" />
  </g>

  <!-- Optional: Add subtle shadow -->
  <g fill="#000000" opacity="0.3">
    <rect x="47" y="32" width="30" height="70" />
    <rect x="42" y="97" width="40" height="8" />
  </g>
</svg>